<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Room Chat</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#1a1a1a;
    color:white;
    margin:0;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
}

.card{
    background:#262626;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
}

input{
    width:100%;
    padding:10px;
    margin:5px 0;
    border:none;
    border-radius:6px;
    box-sizing:border-box;
}

button{
    padding:10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

#messages{
    height:400px;
    overflow-y:auto;
    background:#111;
    border-radius:8px;
    padding:10px;
}

.message{
    margin:5px 0;
}

.system{
    color:#66c8ff;
}

</style>
</head>
<body>

<div class="container">

<div class="card">

<h2>Connexion</h2>

<input
id="username"
placeholder="Pseudo">

<input
id="room"
placeholder="Code de salle">

<button id="joinBtn">
Rejoindre la salle
</button>

</div>

<div class="card">

<div id="messages"></div>

<input
id="messageInput"
placeholder="Message">

<button id="sendBtn">
Envoyer
</button>

</div>

</div>

<script type="module">


// Import the functions you need from the SDKs you need
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import {
    getFirestore,
    collection,
    addDoc,
    query,
    orderBy,
    onSnapshot
}
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";


const firebaseConfig = {
    apiKey: "AIzaSyC_usFloz5flGOoIOQ1NByMl2PxeiDRfvs",
    authDomain: "p2ptest-7bfe6.firebaseapp.com",
    projectId: "p2ptest-7bfe6",
    storageBucket: "p2ptest-7bfe6.firebasestorage.app",
    messagingSenderId: "853874138916",
    appId: "1:853874138916:web:72ff9b37a86e9b947cddb1"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

let currentRoom = "";
let username = "";

const messagesDiv =
document.getElementById("messages");

function addMessage(text){

    const div =
    document.createElement("div");

    div.className =
    "message";

    div.textContent =
    text;

    messagesDiv.appendChild(div);

    messagesDiv.scrollTop =
    messagesDiv.scrollHeight;
}

document
.getElementById("joinBtn")
.addEventListener("click",()=>{

    username =
    document
    .getElementById("username")
    .value
    .trim();

    currentRoom =
    document
    .getElementById("room")
    .value
    .trim()
    .toUpperCase();

    if(!username || !currentRoom){

        alert(
            "Pseudo et salle requis"
        );

        return;
    }

    messagesDiv.innerHTML="";

    const q = query(
        collection(
            db,
            "rooms",
            currentRoom,
            "messages"
        ),
        orderBy("created")
    );

    onSnapshot(q,(snapshot)=>{

        messagesDiv.innerHTML="";

        snapshot.forEach((doc)=>{

            const data =
            doc.data();

            addMessage(
                data.user +
                " : " +
                data.text
            );

        });

    });

});

document
.getElementById("sendBtn")
.addEventListener(
"click",
sendMessage
);

document
.getElementById("messageInput")
.addEventListener(
"keydown",
e=>{

    if(e.key==="Enter"){

        sendMessage();

    }

});

async function sendMessage(){

    if(!currentRoom){

        alert(
            "Rejoins une salle"
        );

        return;
    }

    const input =
    document
    .getElementById(
        "messageInput"
    );

    const text =
    input.value.trim();

    if(!text){
        return;
    }

    await addDoc(
        collection(
            db,
            "rooms",
            currentRoom,
            "messages"
        ),
        {
            user: username,
            text: text,
            created: Date.now()
        }
    );

    input.value="";
}

</script>

</body>
</html>
